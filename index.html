<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>2-back Task</title>
<style>
body {
    font-family: Arial;
    text-align: center;
    margin-top: 50px;
}

/* 中央固定 */
#letter {
    font-size: 80px;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 30px;
    line-height: 1;
}

button {
    font-size: 20px;
    padding: 10px 20px;
    margin: 10px;
}
</style>
</head>

<body>

<h2>2-back</h2>

<button id="startBtn">スタート</button>

<div id="game" style="display:none;">
    <div id="letter">✖</div>
    <button onclick="response()">一致！</button>
</div>

<script>
let sequence = [];
let index = 0;
let logs = [];
let responded = false;

let baseLetters = ["B","F","K","H","M","Q","R","X"];

let timeLimit = 270; // ✅ 内部でのみ使用（4分半）
let timeLeft = timeLimit;
let gameTimer;

let isRunning = false;

let letterDuration = 500;
let fixationDuration = 2000;

const startBtn = document.getElementById("startBtn");
const game = document.getElementById("game");

startBtn.addEventListener("click", () => {
    startBtn.style.display = "none";
    game.style.display = "block";
    startGame();
});

function startGame() {
    isRunning = true;

    sequence = [];
    index = 0;
    logs = [];

    timeLeft = timeLimit;

    // ✅ 見えないカウントダウン
    gameTimer = setInterval(countDown, 1000);

    // ✅ ×から開始
    document.getElementById("letter").innerText = "✖";

    setTimeout(() => {
        if (!isRunning) return;
        nextTrial();
    }, fixationDuration);
}

function countDown() {
    timeLeft--;

    if (timeLeft <= 0) {
        endGame();
    }
}

function nextTrial() {
    if (!isRunning) return;

    responded = false;

    let base = baseLetters[Math.floor(Math.random() * baseLetters.length)];
    let letter = Math.random() < 0.5 ? base.toLowerCase() : base;

    sequence.push(letter);

    document.getElementById("letter").innerText = letter;
    index++;

    setTimeout(() => {

        if (!isRunning) return;

        if (!responded) {
            evaluate(false);
        }

        document.getElementById("letter").innerText = "✖";

        setTimeout(() => {
            if (!isRunning) return;
            nextTrial();
        }, fixationDuration);

    }, letterDuration);
}

function response() {
    if (!isRunning) return;
    if (responded) return;

    responded = true;
    evaluate(true);
}

function evaluate(clicked) {
    if (index < 3) return;

    let current = sequence[index - 1];
    let back2 = sequence[index - 3];

    let match = current.toLowerCase() === back2.toLowerCase();

    let hit = 0;
    let miss = 0;
    let fa = 0;
    let cr = 0;

    if (match && clicked) hit = 1;
    else if (match && !clicked) miss = 1;
    else if (!match && clicked) fa = 1;
    else if (!match && !clicked) cr = 1;

    logs.push([logs.length + 1, hit, miss, fa, cr]);
}

function endGame() {
    isRunning = false;
    clearInterval(gameTimer);

    document.getElementById("letter").innerText = "終了";

    exportCSV();
}

function exportCSV() {
    let csv = "trial,Hit,Miss,FalseAlarm,CorrectRejection\n";

    logs.forEach(row => {
        csv += row.join(",") + "\n";
    });

    let blob = new Blob([csv], { type: "text/csv" });
    let link = document.createElement("a");

    let now = new Date();
    let YYYY = now.getFullYear();
    let MM = String(now.getMonth() + 1).padStart(2,"0");
    let DD = String(now.getDate()).padStart(2,"0");
    let hh = String(now.getHours()).padStart(2,"0");
    let mm = String(now.getMinutes()).padStart(2,"0");

    let filename = `n-back_${YYYY}${MM}${DD}_${hh}${mm}.csv`;

    link.href = URL.createObjectURL(blob);
    link.download = filename;
    link.click();
}
</script>

</body>
</html>
